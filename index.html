      applyCoverCrop(texture);
      texture.needsUpdate = true;
      resolve(texture);
    }, undefined, () => reject(new Error(`Photo texture failed to load: ${url}`))))));

    const heartScaleX = 4.1, heartScaleY = 4.1, heartScaleZ = 4.3;
    function heartField(x, y, z) {
      const horizontal2 = x * x + z * z;
      const base = horizontal2 + y * y - 1;
      return base * base * base - horizontal2 * y * y * y;
    }
    function sampleHeartPoint(surface, region = 'any') {
      for (let attempt = 0; attempt < 12000; attempt++) {
        const x = THREE.MathUtils.randFloatSpread(2.72);
        const y = THREE.MathUtils.randFloat(-1.3, 1.22);
        const z = THREE.MathUtils.randFloatSpread(2.72);
        const value = heartField(x, y, z);
        if (value > 0) continue;
        if (surface && value < -.026) continue;
        if (region === 'lobe' && !(y > .58 && Math.abs(x) > .34 && Math.abs(z) < .72)) continue;
        if (region === 'notch' && !(y > .62 && y < 1.04 && Math.abs(x) > .18 && Math.abs(x) < .58 && Math.abs(z) < .34)) continue;
        if (region === 'tip' && !(y < -.55 && Math.hypot(x, z) < .68)) continue;
        return new THREE.Vector3(x * heartScaleX, y * heartScaleY, z * heartScaleZ);
      }
      return new THREE.Vector3();
    }

    const heartPositions = [
      new THREE.Vector3(-2.7, 1.62, 2.25), new THREE.Vector3(2.7, 1.62, 2.25), new THREE.Vector3(0, .08, 3.55),
      new THREE.Vector3(-3.75, -.2, 1.2), new THREE.Vector3(3.75, -.2, 1.2), new THREE.Vector3(0, -3.15, 1.36),
      new THREE.Vector3(-2.45, .52, -2.65), new THREE.Vector3(2.45, .52, -2.65), new THREE.Vector3(0, 2.52, .82)
    ];
    const floatPositions = [
      new THREE.Vector3(-9.6, 4.8, -5.2), new THREE.Vector3(8.7, 5.3, -6.1), new THREE.Vector3(-.5, 7.2, -8.4),
      new THREE.Vector3(-11.4, -.8, -3.7), new THREE.Vector3(10.9, -.2, -4.8), new THREE.Vector3(-1.2, -7.5, -6.5),
      new THREE.Vector3(-7.8, -4.9, -8.8), new THREE.Vector3(7.6, -5.1, -7.9), new THREE.Vector3(.8, 1.2, -10.4)
    ];
    const photoRotations = [[-.08,.18,-.04],[.08,-.18,.04],[0,0,0],[.08,.3,-.05],[-.08,-.3,.05],[.04,0,0],[-.08,.3,-.04],[.08,-.3,.04],[0,0,0]];
    const focusPosition = new THREE.Vector3(0, 0, 4.35);
    scene.add(new THREE.AmbientLight(0xffe6bf, .55));
    const frameMaterial = new THREE.MeshPhysicalMaterial({ color: 0xfff4d6, emissive: 0xe9c37f, emissiveIntensity: .16, metalness: .05, roughness: .09, transparent: true, opacity: .42, transmission: .18, thickness: .08, depthWrite: false, side: THREE.FrontSide });
    const shadowMaterial = new THREE.MeshBasicMaterial({ color: 0x050308, transparent: true, opacity: .28, depthWrite: false, side: THREE.DoubleSide });
    function makeCard(index) {
      const map = textures[index];
      const card = new THREE.Group();
      const frameGeometry = new THREE.PlaneGeometry(photoCardWidth + .075, photoCardHeight + .085);
      const shadowGeometry = new THREE.PlaneGeometry(photoCardWidth + .16, photoCardHeight + .18);
      const imageGeometry = new THREE.PlaneGeometry(photoCardWidth, photoCardHeight);
      const frontFrame = new THREE.Mesh(frameGeometry, frameMaterial);
      const backFrame = frontFrame.clone(); backFrame.rotation.y = Math.PI;
      const frontShadow = new THREE.Mesh(shadowGeometry, shadowMaterial);
      const backShadow = frontShadow.clone(); backShadow.rotation.y = Math.PI;
      const material = new THREE.MeshBasicMaterial({ map, side: THREE.FrontSide, transparent: true, opacity: 1 });
      const front = new THREE.Mesh(imageGeometry, material);
      const back = front.clone();
      frontShadow.position.set(.035, -.035, -.025); backShadow.position.set(-.035, -.035, .025);
      front.position.set(0, .018, .014); back.position.set(0, .018, -.014); back.rotation.y = Math.PI;
      card.add(frontShadow, backShadow, frontFrame, backFrame, front, back);
      card.position.copy(floatPositions[index]); card.renderOrder = 3;
      card.rotation.set(...photoRotations[index]);
      const heartScale = index === 8 ? 1.08 : .74 + Math.max(heartPositions[index].z, -.8) * .08;
      const floatScale = .44 + (index % 3) * .06;
      card.scale.setScalar(floatScale);
      card.userData = { index, heartScale, floatScale, material, floatPosition: floatPositions[index].clone(), heartPosition: heartPositions[index].clone(), focusPosition: focusPosition.clone() };
      frontShadow.renderOrder = 2; backShadow.renderOrder = 2; frontFrame.renderOrder = 3; backFrame.renderOrder = 3; front.renderOrder = 4; back.renderOrder = 4;
      heartGroup.add(card); cards.push(card); photoMeshes.push(front, back);
    }
    textures.forEach((_, index) => makeCard(index));

    function particleVolume(count, kind) {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const sizes = new Float32Array(count);
      const seeds = new Float32Array(count);
      const white = [new THREE.Color('#ffffff'), new THREE.Color('#fff7e6')];
      const gold = [new THREE.Color('#ffd700'), new THREE.Color('#ffcc66')];
      const red = [new THREE.Color('#ff3355'), new THREE.Color('#ff0033')];
      const heartKind = ['outer', 'lobe', 'notch', 'tip', 'middle', 'core'].includes(kind);
      let mirroredPoint = null;
      function stellarColor() {
        const chance = Math.random();
        let palette;
        if (['outer', 'lobe', 'notch', 'tip'].includes(kind)) palette = chance < .38 ? white : chance < .68 ? gold : red;
        else if (kind === 'middle') palette = chance < .34 ? white : chance < .62 ? gold : red;
        else if (kind === 'core') palette = chance < .26 ? white : chance < .5 ? gold : red;
        else if (kind === 'far') palette = chance < .52 ? white : chance < .84 ? gold : red;
        else if (kind === 'mid') palette = chance < .44 ? white : chance < .76 ? gold : red;
        else palette = chance < .45 ? white : chance < .8 ? gold : red;
        return palette[Math.floor(Math.random() * palette.length)];
      }
      for (let index = 0; index < count; index++) {
        let point;
        if (heartKind && index % 2 === 1 && mirroredPoint) point = new THREE.Vector3(-mirroredPoint.x, mirroredPoint.y, mirroredPoint.z);
        else if (kind === 'outer') point = sampleHeartPoint(true);
        else if (kind === 'lobe') point = sampleHeartPoint(true, 'lobe');
        else if (kind === 'notch') point = sampleHeartPoint(true, 'notch');
        else if (kind === 'tip') point = sampleHeartPoint(true, 'tip');
        else if (kind === 'middle') point = sampleHeartPoint(false);
        else if (kind === 'core') point = sampleHeartPoint(false);
        else if (kind === 'far') point = new THREE.Vector3().randomDirection().multiplyScalar(18 + Math.random() * 31);
        else if (kind === 'mid') {
          const angle = Math.random() * Math.PI * 2, radius = 9 + Math.random() * 12;
          point = new THREE.Vector3(Math.cos(angle) * radius, Math.sin(angle * 2.6) * 2.8 + THREE.MathUtils.randFloatSpread(4), Math.sin(angle) * radius);
        } else point = new THREE.Vector3().randomDirection().multiplyScalar(6 + Math.random() * 8);
        if (heartKind && index % 2 === 0) mirroredPoint = point;
        positions.set([point.x, point.y, point.z], index * 3);
        const color = stellarColor();
        colors.set([color.r, color.g, color.b], index * 3);
        sizes[index] = ['outer', 'lobe', 'notch', 'tip'].includes(kind) ? .42 + Math.random() * 1.08 : kind === 'middle' ? .28 + Math.random() * .64 : kind === 'core' ? .16 + Math.random() * .38 : kind === 'far' ? .08 + Math.random() * .24 : kind === 'mid' ? .22 + Math.random() * .62 : .72 + Math.random() * 1.3;
        seeds[index] = Math.random() * 100;
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
      geometry.setAttribute('aSeed', new THREE.BufferAttribute(seeds, 1));
      const material = new THREE.ShaderMaterial({
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
        uniforms: { uTime: { value: 0 }, uPixel: { value: renderer.getPixelRatio() }, uKind: { value: heartKind ? 1 : kind === 'near' ? 2 : 0 }, uOpacity: { value: 1 } },
        vertexShader: `uniform float uTime;uniform float uPixel;uniform float uKind;attribute vec3 aColor;attribute float aSize;attribute float aSeed;varying vec3 vColor;varying float vTwinkle;void main(){float motion=uKind>.5?.075:.18;vec3 p=position+vec3(sin(uTime*.23+aSeed),cos(uTime*.18+aSeed*1.7),sin(uTime*.16+aSeed*.7))*motion;vec4 mv=modelViewMatrix*vec4(p,1.);float perspective=uKind>.5?60.:48.;gl_PointSize=aSize*uPixel*(perspective/-mv.z);gl_Position=projectionMatrix*mv;vColor=aColor;vTwinkle=.72+.28*sin(uTime*.58+aSeed*2.35);}`,
        fragmentShader: `uniform float uOpacity;varying vec3 vColor;varying float vTwinkle;void main(){float d=distance(gl_PointCoord,vec2(.5));float halo=smoothstep(.52,.08,d);float core=smoothstep(.18,0.,d);float a=(halo*.4+core*.65)*uOpacity*vTwinkle;gl_FragColor=vec4(vColor*(halo*.72+core*1.18)*vTwinkle,a);}`
      });
      const points = new THREE.Points(geometry, material);
      points.renderOrder = 0;
      points.frustumCulled = true;
      (heartKind ? heartGroup : scene).add(points);
      return material;
    }
    function crossStarField(count) {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const sizes = new Float32Array(count);
      const seeds = new Float32Array(count);
      const alphas = new Float32Array(count);
      const white = [new THREE.Color('#ffffff'), new THREE.Color('#fff7e6')];
      const gold = [new THREE.Color('#ffd700'), new THREE.Color('#ffcc66')];
      const red = [new THREE.Color('#ff3355'), new THREE.Color('#ff0033')];
      for (let index = 0; index < count; index++) {
        const layerChance = Math.random();
        const layer = layerChance < .58 ? 'far' : layerChance < .9 ? 'mid' : 'near';
        const radius = layer === 'far' ? 18 + Math.random() * 30 : layer === 'mid' ? 9 + Math.random() * 14 : 5 + Math.random() * 9;
        const point = new THREE.Vector3().randomDirection().multiplyScalar(radius);
        point.y *= .76;
        positions.set([point.x, point.y, point.z], index * 3);
        const chance = Math.random();
        const palette = chance < .56 ? white : chance < .9 ? gold : red;
        const color = palette[Math.floor(Math.random() * palette.length)];
        colors.set([color.r, color.g, color.b], index * 3);
        sizes[index] = layer === 'far' ? 1.6 + Math.random() * 2.5 : layer === 'mid' ? 2.5 + Math.random() * 3.8 : 4.2 + Math.random() * 4.2;
        alphas[index] = layer === 'far' ? .34 + Math.random() * .22 : layer === 'mid' ? .5 + Math.random() * .25 : .66 + Math.random() * .24;
        seeds[index] = Math.random() * 100;
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
      geometry.setAttribute('aSeed', new THREE.BufferAttribute(seeds, 1));
      geometry.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
      const material = new THREE.ShaderMaterial({
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
        uniforms: { uTime: { value: 0 }, uPixel: { value: renderer.getPixelRatio() } },
        vertexShader: `uniform float uTime;uniform float uPixel;attribute vec3 aColor;attribute float aSize;attribute float aSeed;attribute float aAlpha;varying vec3 vColor;varying float vTwinkle;varying float vAlpha;void main(){vec3 p=position+vec3(sin(uTime*.1+aSeed),cos(uTime*.08+aSeed*1.4),sin(uTime*.07+aSeed*.6))*.12;vec4 mv=modelViewMatrix*vec4(p,1.);gl_PointSize=aSize*uPixel*(100./-mv.z);gl_Position=projectionMatrix*mv;vColor=aColor;vAlpha=aAlpha;vTwinkle=.7+.3*sin(uTime*.62+aSeed*2.1);}`,
        fragmentShader: `varying vec3 vColor;varying float vTwinkle;varying float vAlpha;void main(){vec2 uv=abs(gl_PointCoord*2.-1.);float horizontal=exp(-uv.y*31.)*exp(-uv.x*1.9);float vertical=exp(-uv.x*31.)*exp(-uv.y*1.9);float core=exp(-length(uv)*9.2);float glow=exp(-length(uv)*3.)*.28;float shape=min(1.,horizontal+vertical+core+glow);float a=shape*vTwinkle*vAlpha;gl_FragColor=vec4(vColor*(shape*.82+core*.72)*vTwinkle,a);}`
      });
      const points = new THREE.Points(geometry, material);
      points.renderOrder = 1;
      points.frustumCulled = true;
      scene.add(points);
      return material;
    }
    const particleScale = innerWidth < 760 || navigator.hardwareConcurrency < 6 ? .8 : 1;
    const budget = value => Math.round(value * particleScale);
    const heartOuterMaterial = particleVolume(budget(12000), 'outer');
    const heartLobeMaterial = particleVolume(budget(4500), 'lobe');
    const heartNotchMaterial = particleVolume(budget(1000), 'notch');
    const heartTipMaterial = particleVolume(budget(2500), 'tip');
    const heartMiddleMaterial = particleVolume(budget(7000), 'middle');
    const heartCoreMaterial = particleVolume(budget(4000), 'core');
    const farStarMaterial = particleVolume(budget(10000), 'far');
    const midStarMaterial = particleVolume(budget(5000), 'mid');
    const nearStarMaterial = particleVolume(budget(500), 'near');
    farStarMaterial.uniforms.uOpacity.value = .42;
    midStarMaterial.uniforms.uOpacity.value = .68;
    nearStarMaterial.uniforms.uOpacity.value = .86;
    const crossStarMaterial = crossStarField(Math.max(300, budget(420)));

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), .22, .78, .64));
    const bokeh = new BokehPass(scene, camera, { focus: 20, aperture: .000025, maxblur: .0018 });
    composer.addPass(bokeh);
    const debugBox = new THREE.Box3Helper(new THREE.Box3(new THREE.Vector3(-3.85, -3.95, -3.85), new THREE.Vector3(3.85, 3.85, 3.85)), 0xffc75e);
    debugBox.visible = false; scene.add(debugBox);

    let entered = false, elapsed = 0, focusedIndex = null, debugMode = false, debugAngle = 0, photoMode = 'floating', heartParticleMix = 0;
    const clock = new THREE.Clock();
    function setPhotoMode(mode, index = null) {
      photoMode = mode;
      focusedIndex = mode === 'focus' ? index : null;
      controls.enabled = mode !== 'focus' && !debugMode;
    }
    function clearFocus() { setPhotoMode('heart'); }
    function focusedScale(card) {
      const distance = 6.15;
      const visibleHeight = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov * .5)) * distance;
      return Math.min(visibleHeight * .86 / photoCardHeight, visibleHeight * camera.aspect * .88 / photoCardWidth);
    }
    function updateCards(delta) {
      cards.forEach(card => {
        const data = card.userData, isFocus = data.index === focusedIndex;
        const breath = 1 + Math.sin(elapsed * .75 + data.index) * .018;
        const destination = photoMode === 'floating' ? data.floatPosition : photoMode === 'focus' && isFocus ? data.focusPosition : data.heartPosition;
        const scale = photoMode === 'floating' ? data.floatScale * breath : photoMode === 'focus' && isFocus ? focusedScale(card) : data.heartScale * breath;
        card.position.lerp(destination, THREE.MathUtils.damp(0, 1, photoMode === 'focus' && isFocus ? 8 : 3.8, delta));
        card.lookAt(camera.position);
        card.rotateZ(photoRotations[data.index][2]);
        card.scale.setScalar(THREE.MathUtils.lerp(card.scale.x, scale, THREE.MathUtils.damp(0, 1, photoMode === 'focus' && isFocus ? 8 : 3.8, delta)));
        data.material.opacity = THREE.MathUtils.damp(data.material.opacity, photoMode === 'focus' && !isFocus ? .16 : 1, 8, delta);
      });
    }

    addEventListener('pointermove', event => {
      pointer.x = event.clientX / innerWidth * 2 - 1; pointer.y = -(event.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      canvas.style.cursor = raycaster.intersectObjects(photoMeshes, false)[0] ? 'pointer' : 'grab';
    });
    addEventListener('click', event => {
      if (debugMode) return;
      if (event.target.closest('button')) return;
      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObjects(photoMeshes, false)[0];
      if (!hit) { clearFocus(); return; }
      const card = hit.object.parent;
      setPhotoMode(photoMode === 'focus' && focusedIndex === card.userData.index ? 'heart' : 'focus', card.userData.index);
    });
    addEventListener('keydown', event => {
      if (event.key.toLowerCase() !== 't') return;
      debugMode = !debugMode; setPhotoMode('heart'); debugBox.visible = debugMode;
      document.querySelector('#debug').classList.toggle('show', debugMode);
      if (debugMode) { debugAngle = Math.atan2(camera.position.x, camera.position.z); controls.enabled = false; }
    });

    const audio = document.querySelector('#birthday-audio');
    const music = document.querySelector('#music');
    let audioContext, gain, audioReady = false;
    function prepareAudio() {
      if (audioReady) return;
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaElementSource(audio);
      gain = audioContext.createGain(); gain.gain.value = 2.25;
      source.connect(gain).connect(audioContext.destination); audioReady = true;
    }
    function playAudio() { prepareAudio(); audioContext.resume(); audio.play().then(() => music.classList.add('active')).catch(() => { music.title = '未能加载音乐，请确认 virtual.flac 已发布到同一目录'; }); }
    document.querySelector('#enter').addEventListener('click', () => {
      entered = true; setPhotoMode('heart'); document.querySelector('#start').classList.add('hide'); playAudio();
      setTimeout(() => document.querySelector('#message').classList.add('show'), 1200);
    });
    music.addEventListener('click', () => { if (audio.paused) playAudio(); else { audio.pause(); music.classList.remove('active'); } });
    document.querySelector('#reset').addEventListener('click', () => { debugMode = false; debugBox.visible = false; document.querySelector('#debug').classList.remove('show'); setPhotoMode('heart'); controls.reset(); camera.position.set(0, .15, 22); controls.target.set(0, 0, 0); });
    controls.addEventListener('change', () => {
      const distance = camera.position.distanceTo(controls.target);
      if (entered && !debugMode && photoMode !== 'focus' && distance >= 15) setPhotoMode('heart');
    });
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(devicePixelRatio, 1.55)); renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
    });
    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), .05); elapsed += delta;
      if (debugMode) {
        debugAngle += delta * .48;
        camera.position.set(Math.sin(debugAngle) * 22, 2.2, Math.cos(debugAngle) * 22);
        camera.lookAt(0, 0, 0);
      }
      updateCards(delta);
      heartOuterMaterial.uniforms.uTime.value = elapsed; heartLobeMaterial.uniforms.uTime.value = elapsed; heartNotchMaterial.uniforms.uTime.value = elapsed; heartTipMaterial.uniforms.uTime.value = elapsed;
      heartMiddleMaterial.uniforms.uTime.value = elapsed; heartCoreMaterial.uniforms.uTime.value = elapsed;
      farStarMaterial.uniforms.uTime.value = elapsed; midStarMaterial.uniforms.uTime.value = elapsed; nearStarMaterial.uniforms.uTime.value = elapsed; crossStarMaterial.uniforms.uTime.value = elapsed;
      heartParticleMix = THREE.MathUtils.damp(heartParticleMix, photoMode === 'floating' ? .08 : photoMode === 'focus' ? .42 : 1, 3.8, delta);
      heartOuterMaterial.uniforms.uOpacity.value = heartParticleMix; heartLobeMaterial.uniforms.uOpacity.value = heartParticleMix; heartNotchMaterial.uniforms.uOpacity.value = heartParticleMix; heartTipMaterial.uniforms.uOpacity.value = heartParticleMix;
      heartMiddleMaterial.uniforms.uOpacity.value = heartParticleMix * .78; heartCoreMaterial.uniforms.uOpacity.value = heartParticleMix * .46;
      heartGroup.rotation.y += delta * .075; heartGroup.rotation.x = Math.sin(elapsed * .25) * .035;
      heartGroup.scale.setScalar(1 + (Math.sin(elapsed * .55) * .5 + .5) * .03);
      if (focusedIndex !== null) {
        camera.position.lerp(new THREE.Vector3(0, 0, 10.3), THREE.MathUtils.damp(0, 1, 7, delta));
        bokeh.materialBokeh.uniforms.focus.value = 6.15; bokeh.materialBokeh.uniforms.aperture.value = .00009;
      } else { bokeh.materialBokeh.uniforms.focus.value = 20; bokeh.materialBokeh.uniforms.aperture.value = .000025; }
      if (!debugMode) controls.update(); composer.render();
    }
    animate();
  </script>
</body>
